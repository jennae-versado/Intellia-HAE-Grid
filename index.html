<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View Table</title>
    <script type="module" crossorigin src="./index.7508aeab.js"></script>
    <link rel="stylesheet" href="./style.14f5c743.css">
    <style>
      table th {
        border: 1px solid white !important;
        border-right: 8px solid white !important;
      }
      img[src*="logo"] { display: none !important; }
      #fullscreen-btn {
        position: fixed;
        bottom: 16px;
        right: 16px;
        z-index: 9999;
        width: 36px;
        height: 36px;
        background: rgba(0,0,0,0.5);
        border: none;
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition: background 0.2s;
      }
      #fullscreen-btn:hover { background: rgba(0,0,0,0.75); }
      #fullscreen-btn svg { width: 20px; height: 20px; fill: white; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <button id="fullscreen-btn" title="Toggle fullscreen">
      <!-- expand icon -->
      <svg id="icon-expand" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      <!-- collapse icon (hidden by default) -->
      <svg id="icon-collapse" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="display:none"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
    </button>

    <script>
      (function() {
        var btn = document.getElementById('fullscreen-btn');
        var iconExpand = document.getElementById('icon-expand');
        var iconCollapse = document.getElementById('icon-collapse');

        // Determine which document/element to use for fullscreen.
        // Try window.top first (same-origin: direct link or Storyline local).
        // Fall back to current document (cross-origin: Articulate Review).
        function getTopDoc() {
          try { void window.top.document.documentElement; return window.top.document; }
          catch(e) { return document; }
        }

        function enterFullscreen() {
          var d = getTopDoc();
          var el = d.documentElement;
          try {
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.msRequestFullscreen) el.msRequestFullscreen();
          } catch(e) {}
        }

        function exitFullscreen() {
          var d = getTopDoc();
          try {
            if (d.exitFullscreen) d.exitFullscreen();
            else if (d.webkitExitFullscreen) d.webkitExitFullscreen();
            else if (d.msExitFullscreen) d.msExitFullscreen();
          } catch(e) {}
        }

        function isFullscreen() {
          var d = getTopDoc();
          return !!(d.fullscreenElement || d.webkitFullscreenElement);
        }

        btn.addEventListener('click', function() {
          if (!isFullscreen()) { enterFullscreen(); } else { exitFullscreen(); }
        });

        function onFullscreenChange() {
          var fs = isFullscreen();
          iconExpand.style.display = fs ? 'none' : '';
          iconCollapse.style.display = fs ? '' : 'none';
        }

        // Listen on both possible documents
        document.addEventListener('fullscreenchange', onFullscreenChange);
        document.addEventListener('webkitfullscreenchange', onFullscreenChange);
        try {
          window.top.document.addEventListener('fullscreenchange', onFullscreenChange);
          window.top.document.addEventListener('webkitfullscreenchange', onFullscreenChange);
        } catch(e) {}
      })();
    </script>
    
  <script>
    (async function () {
      var config;
      try { config = await fetch('./config.json').then(function(r) { return r.json(); }); }
      catch (e) { return; }

      var headerColors = config.columnHeaderColors || {};
      var cellColors = config.cellColors || [];
      var drugCategories = config.drugCategories || [];
      var hasHeaderColors = Object.keys(headerColors).some(function(k) { return !!headerColors[k]; });
      if (!hasHeaderColors && !cellColors.length && !drugCategories.length) return;

      function applyColors() {
        var table = document.querySelector('table');
        if (!table) return;

        var ths = Array.from(table.querySelectorAll('thead th'));
        var colIndexMap = {};
        ths.forEach(function(th, i) {
          var text = th.textContent.trim().toLowerCase();
          Object.keys(headerColors).forEach(function(key) {
            if (text.startsWith(key.toLowerCase())) {
              colIndexMap[key] = i;
              if (headerColors[key]) {
                th.style.backgroundColor = headerColors[key];
              }
            }
          });
          cellColors.forEach(function(entry) {
            var col = entry.column || '';
            if (text.startsWith(col.toLowerCase())) {
              colIndexMap[col] = i;
            }
          });
        });

        if (cellColors.length) {
          var rows = Array.from(table.querySelectorAll('tr')).filter(function(r) { return r.querySelector('td'); });
          rows.forEach(function(row) {
            var cells = Array.from(row.querySelectorAll('td'));
            if (!cells.length) return;
            var rowLabel = (cells[0].textContent || '').trim().toLowerCase();
            cellColors.forEach(function(entry) {
              var rowKey = (entry.row || '').toLowerCase();
              var colKey = entry.column || '';
              var color = entry.color || '';
              if (!color) return;
              if (rowLabel.includes(rowKey)) {
                var idx = colIndexMap[colKey];
                if (idx !== undefined && cells[idx]) {
                  cells[idx].style.backgroundColor = color;
                }
              }
            });
          });
        }
      }

      function splitDrugList() {
        if (!drugCategories.length) return;

        var bEls = Array.from(document.querySelectorAll('b'));
        var drugNameB = bEls.find(function(el) { return el.textContent.trim() === 'Drug Name'; });
        if (!drugNameB) return;

        var container = drugNameB.parentElement;
        while (container && !container.querySelector('ul')) {
          container = container.parentElement;
        }
        if (!container) return;

        var ul = container.querySelector('ul');
        if (!ul) return;

        // Skip if group headers are already present
        if (ul.querySelector('[data-group-header]')) return;

        // Map bold drug name -> <li> element
        var nameToLi = {};
        Array.from(ul.querySelectorAll('li')).forEach(function(li) {
          var boldEl = li.querySelector('b');
          if (boldEl) {
            nameToLi[boldEl.textContent.trim().toLowerCase()] = li;
          }
        });

        // Insert a header <li> before the first drug in each category
        drugCategories.forEach(function(cat) {
          var firstDrug = (cat.drugs || [])[0];
          if (!firstDrug) return;
          var firstLi = nameToLi[firstDrug.toLowerCase()];
          if (!firstLi) return;

          var headerLi = document.createElement('li');
          headerLi.setAttribute('data-group-header', 'true');
          headerLi.style.cssText = [
            'font-weight:700',
            'font-size:0.68rem',
            'text-transform:uppercase',
            'letter-spacing:0.06em',
            'color:#888',
            'padding:10px 0 3px 0',
            'pointer-events:none',
            'list-style:none',
            'border-top:1px solid #e5e7eb',
            'margin-top:4px'
          ].join(';');
          headerLi.textContent = cat.label;
          ul.insertBefore(headerLi, firstLi);
        });
      }

      function applyAll() {
        applyColors();
        splitDrugList();
      }

      var timer;
      var observer = new MutationObserver(function() {
        clearTimeout(timer);
        timer = setTimeout(applyAll, 60);
      });
      var appEl = document.getElementById('app');
      if (appEl) observer.observe(appEl, { childList: true, subtree: true });
      applyAll();
    })();
  </script>
  </body>
</html>
